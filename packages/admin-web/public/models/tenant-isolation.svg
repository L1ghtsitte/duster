<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Multiple connected spaces for tenant isolation -->
  <!-- Container 1 -->
  <rect x="8" y="12" width="18" height="40" rx="3" fill="none" stroke="#3ecf8e" stroke-width="2"/>
  <!-- Container 1 interior -->
  <circle cx="17" cy="20" r="3" fill="#3ecf8e" opacity="0.5"/>
  <circle cx="17" cy="32" r="3" fill="#3ecf8e" opacity="0.5"/>
  <circle cx="17" cy="44" r="3" fill="#3ecf8e" opacity="0.5"/>

  <!-- Container 2 -->
  <rect x="38" y="12" width="18" height="40" rx="3" fill="none" stroke="#5b8def" stroke-width="2"/>
  <!-- Container 2 interior -->
  <circle cx="47" cy="20" r="3" fill="#5b8def" opacity="0.5"/>
  <circle cx="47" cy="32" r="3" fill="#5b8def" opacity="0.5"/>
  <circle cx="47" cy="44" r="3" fill="#5b8def" opacity="0.5"/>
  <!-- Isolation barrier -->
  <line x1="28" y1="10" x2="28" y2="54" stroke="#f56565" stroke-width="2" stroke-dasharray="4,2"/>
  <!-- Lock icons on barrier -->
  <circle cx="28" cy="24" r="4" fill="none" stroke="#f56565" stroke-width="1.5"/>
  <path d="M26 24h4M26 26l.5.5m3-1l.5.5" stroke="#f56565" stroke-width="1"/>
</svg>