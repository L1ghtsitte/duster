<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- CPU-like core representing H.264 codec -->
  <rect x="12" y="12" width="40" height="40" rx="4" fill="none" stroke="#5b8def" stroke-width="2"/>
  <!-- Cores/squares inside -->
  <rect x="18" y="18" width="12" height="12" rx="2" fill="#5b8def" opacity="0.6"/>
  <rect x="34" y="18" width="12" height="12" rx="2" fill="#5b8def" opacity="0.6"/>
  <rect x="18" y="34" width="12" height="12" rx="2" fill="#5b8def" opacity="0.6"/>
  <rect x="34" y="34" width="12" height="12" rx="2" fill="#5b8def" opacity="0.6"/>
  <!-- Central indicator -->
  <circle cx="32" cy="32" r="4" fill="#f56565"/>
  <!-- Connections between cores -->
  <line x1="30" y1="24" x2="34" y2="24" stroke="#5b8def" stroke-width="1" opacity="0.3"/>
  <line x1="24" y1="30" x2="24" y2="34" stroke="#5b8def" stroke-width="1" opacity="0.3"/>
  <line x1="40" y1="30" x2="40" y2="34" stroke="#5b8def" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="40" x2="34" y2="40" stroke="#5b8def" stroke-width="1" opacity="0.3"/>
</svg>